name: Build MCC OS ISO

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap qemu-user-static binfmt-support

      - name: Inject Custom Packages (Simulated)
        run: |
          # In a real workflow, this would download the artifacts from the build-packages action
          # and place them in config/packages.chroot/ before running live-build
          mkdir -p config/packages.chroot
          echo "Packages injected successfully."

      - name: Build ISO
        run: |
          sudo lb config --bootstrap-qemu-arch arm64 --bootstrap-qemu-static /usr/bin/qemu-aarch64-static --debootstrap-options "--variant=minbase"
          sudo lb build

      - name: Rename ISO
        run: |
          if [ -f live-image-arm64.hybrid.iso ]; then
            mv live-image-arm64.hybrid.iso mccos-arm64.iso
          fi

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mccos-iso
          path: mccos-arm64.iso

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: mccos-arm64.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
